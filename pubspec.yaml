name: bookly
description: "An iOS app to view upcoming events from the native calendar."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  device_calendar: ^4.3.3
  image_picker: ^1.1.2
  intl: ^0.20.2
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
